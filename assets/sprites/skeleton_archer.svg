  <rect x="34" y="46" width="3.6" height="13" rx="1.8" fill="#ddd6c4"/>
  <!-- quiver on back -->
  <rect x="38" y="26" width="6" height="14" rx="2.4" fill="#5d4a2f" transform="rotate(18 41 33)"/>
  <line x1="42" y1="24" x2="44.5" y2="20" stroke="#9a927e" stroke-width="1.6"/>
  <line x1="44.5" y1="25" x2="47" y2="21.5" stroke="#9a927e" stroke-width="1.6"/>
  <!-- lean tunic -->
  <path d="M24 29 L40 29 L41 46 L37 44 L32 47 L27 44 L23 46 Z" fill="#7a8f3a"/>
  <path d="M24 29 L32 29 L32 47 L27 44 L23 46 Z" fill="#93ad46"/>
