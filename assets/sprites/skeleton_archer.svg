  <circle cx="28.8" cy="16" r="0.9" fill="#7fe8a0"/>
  <circle cx="35.8" cy="16" r="0.9" fill="#7fe8a0"/>
  <!-- bow arm extended right, longbow + nocked arrow -->
  <rect x="40" y="31" width="10" height="3.2" rx="1.6" fill="#ddd6c4"/>
  <path d="M52 16 C60 25 60 41 52 50" fill="none" stroke="#7a5a2e" stroke-width="2.6"/>
  <line x1="52" y1="16" x2="52" y2="50" stroke="#cfc8b8" stroke-width="1"/>
  <line x1="40" y1="33" x2="55" y2="33" stroke="#9a927e" stroke-width="1.6"/>
  <path d="M55 33 L51 31 L51 35 Z" fill="#b9c2cc"/>
  <!-- draw arm -->
