  <rect x="39" y="31" width="10" height="3.2" rx="1.6" fill="#c9a789"/>
  <rect x="46" y="30.4" width="14" height="3.6" rx="1.4" fill="#5d4433"/>
  <path d="M50 24 C56 27 56 39 50 42" fill="none" stroke="#4a4038" stroke-width="2.4"/>
  <line x1="50" y1="24.5" x2="50" y2="41.5" stroke="#d8d0c0" stroke-width="1"/>
  <line x1="47" y1="32.2" x2="61" y2="32.2" stroke="#9a8a72" stroke-width="1.4"/>
