  <rect x="33.6" y="46" width="4.4" height="13" rx="2" fill="#6b7480"/>
  <!-- armored torso -->
  <path d="M22 27 L42 27 L44 47 L20 47 Z" fill="#7d8794"/>
  <path d="M22 27 L32 27 L32 47 L20 47 Z" fill="#98a3b1"/>
