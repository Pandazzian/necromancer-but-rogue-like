  <ellipse cx="42" cy="28" rx="5.5" ry="4" fill="#98a3b1"/>
  <!-- great helm with narrow visor -->
  <path d="M23 10 C23 4 41 4 41 10 L41 22 C41 25 23 25 23 22 Z" fill="#8b95a3"/>
  <path d="M23 10 C23 4 32 4 32 4 L32 24 C27 24 23 23.5 23 22 Z" fill="#a4aebc"/>
  <rect x="25.5" y="13" width="13" height="2.6" rx="1.3" fill="#141824"/>
  <circle cx="28.5" cy="14.3" r="0.9" fill="#ffb443"/>
  <circle cx="35.5" cy="14.3" r="0.9" fill="#ffb443"/>
  <!-- helm crest -->
  <path d="M30.5 3 L33.5 3 L33 8 L31 8 Z" fill="#a83232"/>
  <!-- sword arm (right) -->
  <rect x="41" y="31" width="9" height="3.4" rx="1.7" fill="#98a3b1"/>
  <rect x="48.6" y="12" width="3.6" height="24" rx="1.5" fill="#cfd6df"/>
  <rect x="45.5" y="33.4" width="9.6" height="3" rx="1.2" fill="#5d4a2f"/>
  <path d="M50.4 8 L52.2 12 L48.6 12 Z" fill="#cfd6df"/>
