<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The Necromancer: hooded indigo robe, pale face in shadow, glowing tome -->
  <!-- robe -->
  <path d="M32 14 C20 16 16 30 15 46 C14 56 20 60 32 60 C44 60 50 56 49 46 C48 30 44 16 32 14 Z" fill="#2b2a4a"/>
  <path d="M32 16 C23 18 20 30 19 45 C18 54 23 57 32 57 L32 16 Z" fill="#353364"/>
  <!-- robe trim -->
  <path d="M15 46 C22 50 42 50 49 46 L49 50 C42 54 22 54 15 50 Z" fill="#4a4880" opacity="0.9"/>
  <!-- hood -->
  <path d="M32 4 C21 4 16 13 17 22 C22 27 42 27 47 22 C48 13 43 4 32 4 Z" fill="#3c3a6e"/>
  <path d="M32 6 C24 6 20 13 20.5 20 C26 24 38 24 43.5 20 C44 13 40 6 32 6 Z" fill="#2b2a4a"/>
  <!-- face in shadow -->
  <ellipse cx="32" cy="17" rx="8.5" ry="7" fill="#141324"/>
  <!-- glowing eyes -->
  <circle cx="28.5" cy="17" r="1.7" fill="#8ff0b0"/>
  <circle cx="35.5" cy="17" r="1.7" fill="#8ff0b0"/>
  <!-- belt / sash -->
  <path d="M22 36 C28 39 36 39 42 36 L42 40 C36 43 28 43 22 40 Z" fill="#7a5a2e"/>
  <!-- the Tome, held forward, glowing -->
  <rect x="38" y="30" width="13" height="10" rx="1.5" fill="#5a3d20" transform="rotate(-12 44 35)"/>
  <rect x="39.4" y="31.4" width="10.2" height="7.2" rx="1" fill="#8a6a3a" transform="rotate(-12 44 35)"/>
  <circle cx="44.5" cy="34.5" r="2.4" fill="#8ff0b0"/>
  <circle cx="44.5" cy="34.5" r="4.2" fill="#8ff0b0" opacity="0.25"/>
  <!-- left hand -->
  <ellipse cx="20" cy="37" rx="3" ry="2.4" fill="#cfc8b8"/>
</svg>
