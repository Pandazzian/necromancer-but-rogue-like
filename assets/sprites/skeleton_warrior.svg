  <rect x="48.4" y="14" width="3.4" height="22" rx="1.4" fill="#b9c2cc"/>
  <rect x="45.5" y="33" width="9.2" height="3" rx="1.2" fill="#7a5a2e"/>
  <!-- shield arm (left) -->
