  <line x1="32" y1="27" x2="32" y2="30" stroke="#9a927e" stroke-width="1"/>
  <line x1="37" y1="27" x2="37" y2="30" stroke="#9a927e" stroke-width="1"/>
  <!-- skull -->
  <circle cx="32" cy="16" r="10" fill="#ece5d3"/>
  <path d="M26 22 L38 22 L37 27 L27 27 Z" fill="#ece5d3"/>
  <circle cx="28" cy="15" r="2.6" fill="#1c1c26"/>
  <circle cx="36" cy="15" r="2.6" fill="#1c1c26"/>
